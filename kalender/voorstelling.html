<script>
    (function () {
        var MAANDEN = ["januari", "februari", "maart", "april", "mei", "juni",
            "juli", "augustus", "september", "oktober", "november", "december"];

        function formatDatum(datum) {
            var delen = datum.split("-");
            var jaar = parseInt(delen[0], 10);
            var maand = parseInt(delen[1], 10) - 1;
            var dag = parseInt(delen[2], 10);
            return dag + " " + MAANDEN[maand] + " " + jaar;
        }

        function formatTijd(tijd) {
            return tijd;
        }

        var params = new URLSearchParams(window.location.search);
        var id = params.get("id");
        var voorstelling = VOORSTELLINGEN.find(function (v) { return v.id === id; });
        var container = document.getElementById("voorstelling-detail");

        if (!voorstelling) {
            container.innerHTML =
                '<h2 class="text-primary mb-4">Voorstelling niet gevonden</h2>' +
                '<p>Deze voorstelling bestaat niet (meer). Bekijk onze <a href="../index.html#section-kalender">kalender</a> voor de eerstvolgende voorstellingen.</p>';
            return;
        }

        document.title = voorstelling.titel + " · Commotie";

        var pageUrl = "https://commotie.art/kalender/voorstelling.html?id=" + encodeURIComponent(voorstelling.id);
        var pageDescription = seoShortDescription(voorstelling, 155);

        seoSetMeta("name", "description", pageDescription);
        seoSetMeta("property", "og:title", voorstelling.titel + " · Commotie");
        seoSetMeta("property", "og:description", pageDescription);
        seoSetMeta("property", "og:url", pageUrl);
        seoSetCanonical(pageUrl);
        seoInjectJsonLd(seoBuildEventJsonLd(voorstelling, pageUrl));

        var mapsUrl = "https://www.google.com/maps/search/?api=1&query=" +
            encodeURIComponent(voorstelling.locatie + ", " + voorstelling.stad);

        container.innerHTML =
            '<h1 class="detail-title">' + voorstelling.titel + '</h1>' +
            '<p class="detail-sub">Commotie</p>' +
            '<p class="detail-sub2 text-muted">Muzikaal Improvisatietheater</p>' +

            '<div class="detail-meta-box" id="detail-meta-box">' +
                '<span class="detail-meta-item"><span class="icon-calendar-o"></span>' + formatDatum(voorstelling.datum) + '</span>' +
                '<span class="detail-meta-item"><span class="icon-clock-o"></span>' + formatTijd(voorstelling.tijd) + '</span>' +
                '<span class="detail-meta-item"><span class="icon-map-marker"></span>' + voorstelling.locatie + ', ' + voorstelling.stad + '</span>' +
            '</div>' +

            '<img class="detail-image" src="../images/groep2026.jpg" alt="De spelers van Commotie tijdens een improvisatievoorstelling">' +

            (voorstelling.tekst || []).map(function (p, i) {
                return i === 0 ?
                    '<p class="font-weight-bold text-primary mb-3">' + p + '</p>' :
                    '<p class="mb-3">' + p + '</p>';
            }).join('') +

            '<div class="detail-practical">' +
                '<p class="font-weight-bold mb-3">Praktisch</p>' +
                '<button type="button" class="btn btn-secondary px-4 font-weight-bold" disabled>Tickets binnenkort beschikbaar op 30CC</button>' +
                '<ul class="detail-practical-list">' +
                    (voorstelling.duur ? '<li><span class="icon-hourglass-o"></span>' + voorstelling.duur + '</li>' : '') +
                    '<li><span class="icon-map-marker"></span><a href="' + mapsUrl + '" target="_blank" rel="noopener">' + voorstelling.adres + '</a></li>' +
                '</ul>' +
            '</div>' +

            '<p class="detail-share mt-4"><strong class="mr-3">Delen</strong>' +
                '<a href="https://www.facebook.com/improcommotie/" class="text-dark"><span class="icon-facebook"></span></a>' +
                '<a href="https://www.instagram.com/commotie.art/" class="text-dark"><span class="icon-instagram"></span></a>' +
            '</p>' +

            '<p class="mt-4"><a href="../index.html#section-kalender">&larr; Terug naar de kalender</a></p>';

        var metaBox = document.getElementById("detail-meta-box");
        var navbar = document.getElementById("site-navbar");

        function updateStickyOffset() {
            metaBox.style.top = navbar.offsetHeight + "px";
        }

        updateStickyOffset();
        window.addEventListener("resize", updateStickyOffset);
    })();
</script>
